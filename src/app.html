<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />
		<script>
			(function () {
				function readCookie(name) {
					var prefix = name + '=';
					var parts = document.cookie.split(';');
					for (var i = 0; i < parts.length; i += 1) {
						var trimmed = parts[i].trim();
						if (trimmed.indexOf(prefix) === 0) return decodeURIComponent(trimmed.slice(prefix.length));
					}
					return null;
				}
				try {
					var raw = localStorage.getItem('employee-portal-settings');
					var settings = raw ? JSON.parse(raw) : {};
					var root = document.documentElement;
					var sharedTheme = readCookie('phh-ui-theme') || localStorage.getItem('phh-ui-theme');
					if (sharedTheme) {
						settings.theme = sharedTheme;
					}
					var sharedFont = readCookie('phh-ui-font') || localStorage.getItem('phh-ui-font');
					if (sharedFont) {
						settings.font = sharedFont;
					}
					if (settings.theme) {
						var theme = settings.theme;
						if (theme === 'system') {
							var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
							theme = prefersDark ? 'night' : 'winter';
						}
						root.setAttribute('data-theme', theme);
					}
					if (settings.font) {
						root.dataset.appFont = settings.font;
					}
				} catch (error) {
					/* ignore invalid stored settings */
				}
			})();
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
