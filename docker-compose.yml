services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_portal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d employee_portal']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - '1027:1027'
    environment:
      PORT: '1027'
      HOST: '0.0.0.0'
      DATABASE_URL: postgres://postgres:postgres@db:5432/employee_portal
      ORIGIN: http://localhost:1027
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production-use-32-chars-min}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      AUTH_SESSION_EXPIRES_IN: ${AUTH_SESSION_EXPIRES_IN:-7d}
      AUTH_SESSION_UPDATE_AGE: ${AUTH_SESSION_UPDATE_AGE:-1d}
      AUTH_SESSION_COOKIE_CACHE_ENABLED: ${AUTH_SESSION_COOKIE_CACHE_ENABLED:-true}
      AUTH_SESSION_COOKIE_CACHE_MAX_AGE: ${AUTH_SESSION_COOKIE_CACHE_MAX_AGE:-5m}
      AUTH_SESSION_SECURE_COOKIES: ${AUTH_SESSION_SECURE_COOKIES:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
